name: iOS unsigned IPA
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx expo prebuild --platform ios --no-install
      - run: pod install
        working-directory: ios
      - name: Build unsigned IPA
        working-directory: ios
        run: |
          WS=$(ls -d *.xcworkspace | head -1)
          SCHEME=$(basename "$WS" .xcworkspace)
          echo "Workspace=$WS Scheme=$SCHEME"
          xcodebuild -workspace "$WS" -scheme "$SCHEME" -configuration Release -sdk iphoneos -destination 'generic/platform=iOS' -archivePath "$PWD/build/App.xcarchive" CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" archive
          APP=$(ls -d build/App.xcarchive/Products/Applications/*.app | head -1)
          mkdir -p build/Payload
          cp -R "$APP" build/Payload/
          (cd build && zip -qry ShortFlix-unsigned.ipa Payload)
      - uses: actions/upload-artifact@v4
        with:
          name: ShortFlix-unsigned-ipa
          path: ios/build/ShortFlix-unsigned.ipa
          if-no-files-found: error
