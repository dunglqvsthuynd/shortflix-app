name: iOS unsigned IPA
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Select newest Xcode (needs Swift 6.2 for Expo/RN)
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          xcodebuild -version
          swift --version
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx expo prebuild --platform ios --no-install
      - run: pod install
        working-directory: ios
      - name: Build unsigned IPA
        working-directory: ios
        run: |
          WS=$(ls -d *.xcworkspace | head -1)
          SCHEME=$(basename "$WS" .xcworkspace)
          echo "Workspace=$WS Scheme=$SCHEME"
          xcodebuild -workspace "$WS" -scheme "$SCHEME" -configuration Release -sdk iphoneos -destination 'generic/platform=iOS' -derivedDataPath build CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" build
          APP=$(find build/Build/Products -maxdepth 2 -name "*.app" | head -1)
          echo "APP=$APP"
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -qry ShortFlix-unsigned.ipa Payload
          ls -la ShortFlix-unsigned.ipa
      - uses: actions/upload-artifact@v4
        with:
          name: ShortFlix-unsigned-ipa
          path: ios/ShortFlix-unsigned.ipa
          if-no-files-found: error
